name: Deploy to memoria.sinilos.com

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Deploy via SSH + tar
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          tar czf /tmp/dist.tar.gz -C dist .
          scp -P 1020 -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            /tmp/dist.tar.gz r307889@sinilos.com:/tmp/dist.tar.gz
          ssh -p 1020 -i /tmp/deploy_key -o StrictHostKeyChecking=no \
            r307889@sinilos.com \
            'rm -rf ~/memoria.sinilos.com/* && tar xzf /tmp/dist.tar.gz -C ~/memoria.sinilos.com/ && rm /tmp/dist.tar.gz && echo OK'
          rm /tmp/deploy_key /tmp/dist.tar.gz
